<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wing-gradient" x1="250" y1="250" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0066cc"/>
      <stop offset="0.5" stop-color="#00ccff"/>
      <stop offset="1" stop-color="#33ccff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 蝴蝶主体 -->
  <g id="butterfly">
    <!-- 身体 -->
    <ellipse cx="250" cy="250" rx="8" ry="60" fill="#1a1a1a"/>
    
    <!-- 触角 -->
    <path d="M245 200 Q 230 160 220 150" stroke="black" stroke-width="2" fill="none"/>
    <path d="M255 200 Q 270 160 280 150" stroke="black" stroke-width="2" fill="none"/>
    <circle cx="220" cy="150" r="3" fill="black"/>
    <circle cx="280" cy="150" r="3" fill="black"/>
    
    <!-- 右上翅膀 -->
    <path d="M255 240 C 300 150, 450 120, 480 200 C 490 240, 450 300, 400 320 C 350 340, 265 260, 255 240" 
          fill="url(#wing-gradient)" stroke="black" stroke-width="2"/>
    <path d="M255 240 C 300 150, 450 120, 480 200 C 490 240, 450 300, 400 320 C 350 340, 265 260, 255 240" 
          fill="none" stroke="black" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- 右后翅膀 -->
    <path d="M255 260 C 270 350, 400 400, 380 450 C 350 490, 250 450, 255 260" 
          fill="url(#wing-gradient)" stroke="black" stroke-width="2"/>
    <path d="M255 260 C 270 350, 400 400, 380 450 C 350 490, 250 450, 255 260" 
          fill="none" stroke="black" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- 左上翅膀 -->
    <path d="M245 240 C 200 150, 50 120, 20 200 C 10 240, 50 300, 100 320 C 150 340, 235 260, 245 240" 
          fill="url(#wing-gradient)" stroke="black" stroke-width="2"/>
    <path d="M245 240 C 200 150, 50 120, 20 200 C 10 240, 50 300, 100 320 C 150 340, 235 260, 245 240" 
          fill="none" stroke="black" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- 左后翅膀 -->
    <path d="M245 260 C 230 350, 100 400, 120 450 C 150 490, 250 450, 245 260" 
          fill="url(#wing-gradient)" stroke="black" stroke-width="2"/>
    <path d="M245 260 C 230 350, 100 400, 120 450 C 150 490, 250 450, 245 260" 
          fill="none" stroke="black" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- 翅膀边缘装饰 -->
    <circle cx="470" cy="180" r="3" fill="white"/>
    <circle cx="480" cy="210" r="3" fill="white"/>
    <circle cx="475" cy="240" r="3" fill="white"/>
    <circle cx="450" cy="290" r="3" fill="white"/>
    <circle cx="380" cy="460" r="3" fill="white"/>
    <circle cx="350" cy="470" r="3" fill="white"/>
    
    <circle cx="30" cy="180" r="3" fill="white"/>
    <circle cx="20" cy="210" r="3" fill="white"/>
    <circle cx="25" cy="240" r="3" fill="white"/>
    <circle cx="50" cy="290" r="3" fill="white"/>
    <circle cx="120" cy="460" r="3" fill="white"/>
    <circle cx="150" cy="470" r="3" fill="white"/>
  </g>
</svg>