<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
      <feDisplacementMap in="blur" in2="noise" scale="30" />
    </filter>
    <filter id="paper-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic" />
    </filter>
    <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>
    <linearGradient id="mountain-gradient-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0a0a0" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#808080" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="mountain-gradient-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#606060" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#404040" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="mountain-gradient-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#303030" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#101010" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <!-- Background Paper -->
  <rect width="100%" height="100%" fill="url(#sky-gradient)" />
  <rect width="100%" height="100%" fill="#fcfcfc" opacity="0.5" filter="url(#paper-texture)" />

  <!-- Distant Mountains -->
  <path d="M-100 600 Q 400 300 900 600 T 1920 500 V 1080 H -100 Z" fill="url(#mountain-gradient-1)" filter="url(#ink-blur)" opacity="0.6" />
  
  <!-- Mid-range Mountains -->
  <path d="M-200 800 Q 300 500 800 900 T 1600 700 T 2200 1000 V 1080 H -200 Z" fill="url(#mountain-gradient-2)" filter="url(#ink-blur)" opacity="0.7" />

  <!-- Foreground Mountains (Closer, darker) -->
  <path d="M-100 1080 Q 200 800 600 1080 T 1200 950 T 2000 1080 Z" fill="url(#mountain-gradient-3)" filter="url(#ink-blur)" opacity="0.8" />
  
  <!-- Mist/Fog -->
  <rect x="0" y="600" width="100%" height="480" fill="url(#sky-gradient)" opacity="0.3" filter="url(#ink-blur)" />
  
</svg>